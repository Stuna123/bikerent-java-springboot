<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Mes réservations</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

        <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    </head>

    <body>

        <div class="container mt-5">
            <!-- Titre principal de la page -->
            <h1 class="text-center mb-4">Mes réservations</h1>

            <!-- Message affiché si aucune réservation n'existe -->
            <div th:if="${#lists.isEmpty(reservations)}" class="alert alert-info">
                Aucune réservation trouvée pour le moment.
            </div>

            <!-- Tableau affiché si des réservations existent
                Avant <div th:if="${!#lists.isEmpty(reservations)}">
               -->
            <div class="table-responsive">
                <table class="table table-bordered table-striped table-hover">
                    <thead class="table-dark">
                    <tr>
                        <th>ID</th>
                        <th>Vélo</th>
                        <th>Date</th>
                        <th>Heure début</th>
                        <th>Heure fin</th>
                        <th>Prix total</th>
                    </tr>
                    </thead>
                    <tbody>
                    <!-- Boucle sur toutes les réservations -->
                    <tr th:each="reservation : ${reservations}">
                        <td th:text="${reservation.id}"></td>
                        <td th:text="${reservation.bike.name}"></td>
                        <td th:text="${reservation.startDate}"></td>
                        <td th:text="${reservation.startTime}"></td>
                        <td th:text="${reservation.endTime}"></td>
                        <td th:text="${reservation.totalPrice} + ' €'"></td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Bouton de retour vers la liste des vélos -->
            <div class="mt-3">
                <a href="/bikes" class="btn btn-secondary">Retour aux vélos</a>
            </div>
        </div>

    </body>
</html>
