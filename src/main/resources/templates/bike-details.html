<!DOCTYPE html>
<html
        xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
        lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Détail du vélo</title>

        <!-- Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

        <!-- CSS principal -->
        <link rel="stylesheet" th:href="@{/css/style.css}">

        <!-- Favicon -->
        <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    </head>

    <body id="pageBody">
        <!-- Barre du haut -->
        <div class="container mt-3">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">

                <!-- Gauche : thème -->
                <div>
                    <button id="themeToggle" class="btn btn-outline-secondary">
                        🌙 Mode sombre
                    </button>
                </div>

                <!-- Centre : utilisateur connecté -->
                <div>
                    <span sec:authorize="isAuthenticated()" class="text-dark" id="userStatus">
                        Connecté en tant que :
                        <strong sec:authentication="name"></strong>
                    </span>
                </div>

                <!-- Droite : connexion / déconnexion -->
                <div class="d-flex gap-2">
                    <a sec:authorize="!isAuthenticated()"
                       th:href="@{/login}"
                       class="btn btn-primary">
                        Connexion
                    </a>

                    <form sec:authorize="isAuthenticated()"
                          th:action="@{/logout}"
                          method="post"
                          style="display:inline;">
                        <button type="submit" class="btn btn-danger">
                            Déconnexion
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="container py-5">
            <div class="row g-5 align-items-center">

                <!-- Image -->
                <div class="col-lg-6">
                    <img th:src="@{/images/{img}(img=${bike.imageName})}"
                         alt="Image du vélo"
                         class="img-fluid rounded-4 shadow"
                         style="width: 100%; max-height: 450px; object-fit: cover;">
                </div>

                <!-- Infos -->
                <div class="col-lg-6">
                    <h1 class="fw-bold mb-4" th:text="${bike.name}">Nom du vélo</h1>

                    <div class="card custom-card border-0 shadow-sm p-4">
                        <p class="mb-3">
                            <strong>Type :</strong>
                            <span th:text="${bike.type}">Type</span>
                        </p>

                        <p class="mb-3">
                            <strong>Prix :</strong>
                            <span th:text="${bike.hourlyPrice}">0</span> €/heure
                        </p>

                        <p class="mb-4">
                            <strong>Description :</strong><br>
                            <span th:text="${bike.description}">Description du vélo</span>
                        </p>

                        <!-- Actions -->
                        <div class="d-flex flex-wrap gap-2">
                            <a href="/bikes" class="btn btn-outline-secondary">
                                Retour
                            </a>

                            <a sec:authorize="isAuthenticated()"
                               th:href="@{/reserve/{id}(id=${bike.id})}"
                               class="btn btn-success">
                                Réserver
                            </a>

                            <a sec:authorize="!isAuthenticated()"
                               th:href="@{/login}"
                               class="btn btn-primary">
                                Se connecter pour réserver
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

        <!-- Script thème -->
        <script th:src="@{/js/theme.js}"></script>
    </body>
</html>
