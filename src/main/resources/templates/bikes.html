<!DOCTYPE html>
<html
        xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
        lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nos vélos</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS principal -->
    <link rel="stylesheet" th:href="@{/css/style.css}">

    <!-- Favicon -->
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
</head>

    <body id="pageBody">

        <!-- Barre du haut -->
        <div class="container mt-3">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">

                <!-- Partie gauche : bouton thème -->
                <div>
                    <button id="themeToggle" class="btn btn-outline-secondary">
                        🌙 Mode sombre
                    </button>
                </div>

                <!-- Partie centre : utilisateur connecté -->
                <div>
                    <span sec:authorize="isAuthenticated()" class="text-dark" id="userStatus">
                        Connecté en tant que :
                        <strong sec:authentication="name"></strong>
                    </span>
                </div>

                <!-- Partie droite : connexion / déconnexion -->
                <div class="d-flex gap-2">
                    <a sec:authorize="!isAuthenticated()"
                       th:href="@{/login}"
                       class="btn btn-primary">
                        Connexion
                    </a>

                    <form sec:authorize="isAuthenticated()"
                          th:action="@{/logout}"
                          method="post"
                          style="display:inline;">
                        <button type="submit" class="btn btn-danger">
                            Déconnexion
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="container mt-4">
            <!-- Titre -->
            <h1 class="text-center mb-4">Nos vélos disponibles</h1>

            <!-- Boutons d'action -->
            <div class="d-flex justify-content-center flex-wrap gap-2 mb-4">

                <a href="/reservations" class="btn btn-outline-primary">
                    Voir l'historique des réservations
                </a>

                <a href="/" class="btn btn-primary">
                    Accueil
                </a>

                <a sec:authorize="hasRole('ADMIN')"
                   th:href="@{/admin/dashboard}"
                   class="btn btn-dark">
                    Accéder au dashboard admin
                </a>
            </div>

            <!-- Message succès -->
            <div th:if="${successMessage}"
                 class="alert alert-success alert-dismissible fade show"
                 role="alert">
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <!-- Filtre -->
            <form method="get" action="/bikes" class="row g-2 mb-4 justify-content-center">
                <div class="col-md-5">
                    <select name="type" class="form-select">
                        <option value="">Tous les types</option>
                        <option value="Ville">Ville</option>
                        <option value="VTT">VTT</option>
                        <option value="Electrique">Électrique</option>
                        <option value="Pliant">Pliant</option>
                        <option value="Route">Route</option>
                        <option value="Cargo">Cargo</option>
                    </select>
                </div>

                <div class="col-md-3">
                    <button type="submit" class="btn btn-dark w-100">
                        Filtrer
                    </button>
                </div>
            </form>

            <!-- Liste vélos -->
            <div class="row">
                <div class="col-md-4 mb-4" th:each="bike : ${bikes}">
                    <div class="card h-100 shadow-sm">

                        <!-- Image -->
                        <img th:src="@{/images/{img}(img=${bike.imageName})}"
                             class="card-img-top"
                             alt="Image du vélo"
                             style="height: 220px; object-fit: cover;">

                        <div class="card-body d-flex flex-column">
                            <h5 class="card-title" th:text="${bike.name}">Nom</h5>

                            <p class="card-text mb-2">
                                <strong>Type :</strong>
                                <span th:text="${bike.type}"></span>
                            </p>

                            <p class="card-text mb-2">
                                <strong>Prix :</strong>
                                <span th:text="${bike.hourlyPrice}"></span> €/heure
                            </p>

                            <p class="card-text" th:text="${bike.description}"></p>
                        </div>

                        <div class="card-footer text-center bg-white border-0 pb-3">
                            <a th:href="@{/bikes/{id}(id=${bike.id})}" class="btn btn-primary">
                                Voir détails
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

        <!-- Script thème -->
        <script th:src="@{/js/theme.js}"></script>

    </body>
</html>
