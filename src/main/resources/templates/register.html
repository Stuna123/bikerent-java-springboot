<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Inscription</title>

        <!--- Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

        <!-- CSS principal -->
        <link rel="stylesheet" th:href="@{/css/style.css}">

        <!-- Favicon -->
        <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    </head>

    <body id="pageBody">

        <!-- Barre du haut -->
        <div class="container mt-3">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">

                <!-- Gauche : thème -->
                <div>
                    <button id="themeToggle" class="btn btn-outline-secondary">
                        🌙 Mode sombre
                    </button>
                </div>

                <!-- Droite -->
                <div class="d-flex gap-2">
                    <a href="/" class="btn btn-outline-dark">Accueil</a>
                    <a href="/login" class="btn btn-primary">Connexion</a>
                </div>
            </div>
        </div>

        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">

                    <div class="card custom-card border-0 shadow-sm p-4 p-md-5">
                        <!-- Titre principal -->
                        <h1 class="text-center fw-bold mb-4">Créer un compte</h1>

                        <!-- Message d'erreur -->
                        <div th:if="${errorMessage}" class="alert alert-danger">
                            <span th:text="${errorMessage}"></span>
                        </div>

                        <!-- Message de succès -->
                        <div th:if="${successMessage}" class="alert alert-success">
                            <span th:text="${successMessage}"></span>
                        </div>

                        <form th:action="@{/register}" th:object="${user}" method="post">
                            <div class="mb-3">
                                <label for="name" class="form-label">Nom</label>
                                <input  type="text"
                                        id="name"
                                        th:field="*{name}"
                                        class="form-control"
                                        placeholder="Votre nom"
                                        required>
                            </div>

                            <div class="mb-3">
                                <label for="email" class="form-label">Email</label>
                                <input type="email"
                                       id="email"
                                       th:field="*{email}"
                                       class="form-control"
                                       placeholder="Votre email"
                                       required>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label"> Mot de passe (l'idéal avec 8 caractères) </label>
                                <input  type="password"
                                        id="password"
                                        th:field="*{password}"
                                        class="form-control"
                                        placeholder="Votre mot de passe"
                                        required>
                            </div>

                            <button type="submit" class="btn btn-success w-100 mb-3">S'inscrire</button>
                        </form>

                        <p class="text-center mb-0">
                            Vous avez déjà un compte ?
                            <a th:href="@{/login}" class="fw-semibold">Se connecter</a>
                        </p>
                    </div>

                </div>
            </div>
        </div>

        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

        <!-- Script theme -->
        <script th:src="@{/js/theme.js}"></script>

    </body>
</html>
