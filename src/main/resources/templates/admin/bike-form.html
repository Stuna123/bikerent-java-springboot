<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Ajouter un vélo - Admin</title>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
        <link rel="stylesheet" th:href="@{/css/style.css}">
    </head>
    <body id="pageBody">
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
            <div class="container">
                <a class="navbar-brand" th:href="@{/admin/dashboard}">
                    BikeRent Admin
                </a>

                <div class="d-flex gap-2">
                    <a class="btn btn-outline-light btn-sm" th:href="@{/admin/bikes}">
                        Retour aux vélos
                    </a>
                    <form th:action="@{/logout}" method="post" style="display: inline;">
                        <button type="submit" class="btn btn-outline-danger btn-sm">
                            Déconnexion
                        </button>

                    </form>
                </div>
            </div>
        </nav>

        <main class="container py-4">
            <div class="row justify-content-center">
                <div class="col-lg-8">

                    <div class="card border-0 shadow-sm">
                        <div class="card-body p-4">

                            <h1 class="fw-bold mb-2">Formulaire vélo</h1>
                            <p class="text-muted mb-4">
                                Renseigne les informations du vélo puis enregistre les modifications.
                            </p>

                            <form th:action="@{/admin/bikes}" th:object="${bike}" method="post">
                                <input type="hidden" th:field="*{id}">
                                <div class="mb-3">
                                    <label for="name" class="form-label">Nom du vélo</label>
                                    <input  type="text"
                                            id="name"
                                            th:field="*{name}"
                                            class="form-control"
                                            placeholder="Ex: Vélo Gravel Adventure"
                                            required
                                    >

                                </div>
                                <div class="mb-3">
                                    <label for="type" class="form-label">Type</label>
                                    <input  type="text"
                                            id="type"
                                            th:field="*{type}"
                                            class="form-control"
                                            placeholder="Ex: Ville, VTT, ELECTRIQUE, Route"
                                            required
                                    >

                                </div>

                                <div class="mb-3">
                                    <label for="hourlyPrice" class="form-label">Prix par heure</label>
                                    <input  type="number"
                                            id="hourlyPrice"
                                            th:field="*{hourlyPrice}"
                                            class="form-control"
                                            step="0.01"
                                            min="0"
                                            placeholder="Ex: 7.50"
                                            required
                                    >
                                </div>

                                <div class="mb-3">
                                    <label for="imageName" class="form-label">Nom de l'image</label>
                                    <input  type="text"
                                            id="imageName"
                                            th:field="*{imageName}"
                                            class="form-control"
                                            placeholder="Ex: city-bike.jpg"
                                            required
                                    >
                                    <div class="form-text">
                                        L'image doit déjà exister dans le dossier <strong>static/images</strong>
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="description" class="form-control">Description</label>
                                    <textarea id="description"
                                              th:field="*{description}"
                                              class="form-control"
                                              rows="4"
                                              placeholder="Description du vélo..."
                                              required
                                    >

                                    </textarea>
                                </div>
                                <div class="form-check mb-4">
                                    <input type="checkbox"
                                           id="available"
                                           th:field="*{available}"
                                           class="form-check-input"
                                    >
                                    <label for="available" class="form-check-label">
                                        Disponible
                                    </label>
                                </div>

                                <div class="d-flex justify-content-between">
                                    <a th:href="@{/admin/bikes}" class="btn btn-outline-secondary">
                                        Annuler
                                    </a>

                                    <button type="submit" class="btn btn-primary">
                                        Enregistrer le vélo
                                    </button>
                                </div>
                            </form>

                        </div>
                    </div>

                </div>
            </div>
        </main>

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
        <script th:src="@{/js/theme.js}"></script>
    </body>
</html>
