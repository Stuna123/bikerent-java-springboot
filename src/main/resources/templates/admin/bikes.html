<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <title>Gestion des vélos - Admin</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    </head>
    <body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
            <div class="container">
                <a class="navbar-brand" th:href="@{/admin/dashboard}">BikeRent Admin</a>
                <div>
                    <a class="btn btn-outline-light btn-sm" th:href="@{/bikes}">Voir le site</a>
                    <a class="btn btn-outline-danger btn-sm ms-2" th:href="@{/logout}">Déconnexion</a>
                </div>
            </div>
        </nav>

        <main class="container">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1>Gestion des vélos</h1>
                    <p class="text-muted">Liste des vélos disponibles dans l'application.</p>
                </div>

                <a class="btn btn-primary" th:href="@{/admin/bikes/new}">
                    Ajouter un vélo
                </a>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">

                    <table class="table table-striped align-middle">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Image</th>
                                <th>Nom</th>
                                <th>Type</th>
                                <th>Prix / heure</th>
                                <th>Disponible</th>
                                <th class="text-end">Actions</th>
                            </tr>
                        </thead>

                        <tbody>
                            <tr th:each="bike : ${bikes}">
                                <td th:text="{bike.id}">1</td>
                                <td>
                                    <img th:src="@{'/images/' + ${bike.imageName}}"
                                         alt="Image vélo"
                                         style="width: 70px; height: 50px; object-fit: cover;"
                                         class="rounded"
                                    >
                                </td>
                                <td th:text="${bike.name}">Vélo urbain</td>
                                <td th:text="${bike.type}">Ville</td>
                                <td th:text="${bike.hourlyPrice + ' €'}">5.00 €</td>

                                <td>
                                    <span th:if="${bike.available}" class="badge bg-success">Oui</span>
                                    <span th:unless="${bike.available}" class="badge bg-danger">Non</span>
                                </td>

                                <td class="text-end">
                                    <a class="btn btn-warning btn-sm"
                                        th:href="@{/admin/bikes/edit/{id}(id=${bike.id})"
                                    >
                                        Modifier
                                    </a>
                                    <a class="btn btn-danger btn-sm"
                                        th:href="@{/admin/bikes/delete/{id}(id=${bike.id})}"
                                       onclick="return confim('Voulez-vous vraiment supprimer ce vélo ?');">

                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>

                    <div th:if="${#lists.isEmpty(bikes)}" class="alert alert-info">
                        Aucun vélo enregistré pour le moment.
                    </div>

                </div>
            </div>
        </main>
    </body>
</html>
