<!DOCTYPE html>
<html
        xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
        lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Connexion</title>

        <!-- Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

        <!-- CSS principal -->
        <link rel="stylesheet" th:href="@{/css/style.css}">

        <!-- Favicon -->
        <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    </head>

    <body id="pageBody">
        <!-- Barre du haut -->
        <div class="container mt-3">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">

                <!-- Gauche : thème -->
                <div>
                    <button id="themeToggle" class="btn btn-outline-secondary">
                        🌙 Mode sombre
                    </button>
                </div>

                <!-- Centre -->
                <div></div>

                <!-- Droite -->
                <div class="d-flex gap-2">
                    <a href="/" class="btn btn-outline-dark">Accueil</a>
                    <a href="/bikes" class="btn btn-primary">Nos vélos</a>
                </div>
            </div>
        </div>

        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-5">

                    <div class="card custom-card border-0 shadow-sm p-4 p-md-5">
                        <h1 class="text-center fw-bold mb-4">Connexion</h1>

                        <!-- Message d'erreur -->
                        <div th:if="${param.error}" class="alert alert-danger">
                            Email ou mot de passe incorrect.
                        </div>

                        <!-- Message logout -->
                        <div th:if="${param.logout}" class="alert alert-success">
                            Vous avez été déconnecté avec succès.
                        </div>

                        <form th:action="@{/login}" method="post">
                            <div class="mb-3">
                                <label for="username" class="form-label">Email</label>
                                <input type="email"
                                       id="username"
                                       name="username"
                                       class="form-control"
                                       placeholder="Votre email"
                                       required>
                            </div>

                            <div class="mb-4">
                                <label for="password" class="form-label">Mot de passe</label>
                                <input type="password"
                                       id="password"
                                       name="password"
                                       class="form-control"
                                       placeholder="Votre mot de passe"
                                       required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 mb-3">
                                Se connecter
                            </button>
                        </form>

                        <p class="text-center mb-0">
                            Vous n'avez pas encore de compte ?
                            <a th:href="@{/register}" class="fw-semibold">Créer un compte</a>
                        </p>
                    </div>

                </div>
            </div>
        </div>

        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

        <!-- Script thème -->
        <script th:src="@{/js/theme.js}"></script>
    </body>
</html>
