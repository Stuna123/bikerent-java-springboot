<!DOCTYPE html>
<html
        xmlns:th="http://www.thymeleaf.org"
        xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
        lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Réserver un vélo</title>

        <!-- Bootstrap -->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

        <!-- CSS principal -->
        <link rel="stylesheet" th:href="@{/css/style.css}">

        <!-- Favicon -->
        <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    </head>

    <body id="pageBody">

        <!-- Barre du haut -->
        <div class="container mt-3">
            <div class="d-flex justify-content-between align-items-center flex-wrap gap-2">

                <!-- Gauche : thème -->
                <div>
                    <button id="themeToggle" class="btn btn-outline-secondary">
                        🌙 Mode sombre
                    </button>
                </div>

                <!-- Centre : utilisateur -->
                <div>
                    <span sec:authorize="isAuthenticated()" class="text-dark" id="userStatus">
                        Connecté en tant que :
                        <strong sec:authentication="name"></strong>
                    </span>
                </div>

                <!-- Droite : session -->
                <div class="d-flex gap-2">
                    <a sec:authorize="!isAuthenticated()"
                       th:href="@{/login}"
                       class="btn btn-primary">
                        Connexion
                    </a>

                    <form sec:authorize="isAuthenticated()"
                          th:action="@{/logout}"
                          method="post"
                          style="display:inline;">
                        <button type="submit" class="btn btn-danger">
                            Déconnexion
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-lg-8">

                    <div class="card custom-card border-0 shadow-sm p-4 p-md-5">
                        <h1 class="fw-bold mb-4">
                            Réserver :
                            <span th:text="${bike.name}">Nom du vélo</span>
                        </h1>

                        <!-- Message d'erreur -->
                        <div th:if="${errorMessage}" class="alert alert-danger" role="alert">
                            <span th:text="${errorMessage}"></span>
                        </div>

                        <!-- Formulaire -->
                        <form th:action="@{/reserve}"
                              th:object="${reservation}"
                              method="post">

                            <input type="hidden" name="bikeId" th:value="${bike.id}">

                            <!-- Date début -->
                            <div class="mb-3">
                                <label for="startDate" class="form-label">Date début</label>
                                <input type="date"
                                       id="startDate"
                                       th:field="*{startDate}"
                                       class="form-control"
                                       required>
                            </div>

                            <!-- Heure début -->
                            <div class="mb-3">
                                <label for="startTime" class="form-label">Heure début</label>
                                <input type="time"
                                       id="startTime"
                                       th:field="*{startTime}"
                                       class="form-control"
                                       required>
                            </div>

                            <!-- Date fin -->
                            <div class="mb-3">
                                <label for="endDate" class="form-label">Date fin</label>
                                <input type="date"
                                       id="endDate"
                                       th:field="*{endDate}"
                                       class="form-control"
                                       required>
                            </div>

                            <!-- Heure fin -->
                            <div class="mb-4">
                                <label for="endTime" class="form-label">Heure fin</label>
                                <input type="time"
                                       id="endTime"
                                       th:field="*{endTime}"
                                       class="form-control"
                                       required>
                            </div>

                            <!-- Boutons -->
                            <div class="d-flex flex-wrap gap-2">
                                <button type="submit" class="btn btn-success">
                                    Valider
                                </button>

                                <a href="/bikes" class="btn btn-outline-secondary">
                                    Retour
                                </a>
                            </div>
                        </form>
                    </div>

                </div>
            </div>
        </div>

        <!-- Bootstrap JS -->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

        <!-- Script thème -->
        <script th:src="@{/js/theme.js}"></script>

    </body>
</html>
